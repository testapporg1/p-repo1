# Quickstart: Black Duck Security Scan Action with polaris:
#     https://blackduck-dev.zoominsoftware.io/bundle/bridge/page/documentation/t_github-polaris-quickstart.html
name: Polaris Security Scan
on:
  push:
    branches:
      - main
      - master
      - develop
      - stage
      - release
  pull_request:
    branches:
      - main
      - master
      - develop
      - stage
      - release
  workflow_dispatch: {}
jobs:
  polaris:
    runs-on: sh_window_sashi
    steps:
      - name: Checkout Source
        uses: actions/checkout@v5

      - name: Polaris Security Scan
        id: polaris-scan
        uses: blackduck-inc/black-duck-security-scan@v2
        with:
          ### SCANNING: Required fields
          polaris_server_url: ${{ vars.POLARIS_URL }}
          polaris_access_token: ${{ secrets.POLARIS_ACCESS_TOKEN }}
          ### ASSESSMENT TYPES
          polaris_assessment_types: SCA  # Comma-separated list: SAST,SCA,DAST
          ### ADDED FOR MY TESTING
          polaris_test_sca_type: SCA-CONTAINER
          polaris_artifactToUpload: 'C:\Users\SashikantaMohanty\Desktop\nginx.tar.gz'
          ### SCANNING: Optional fields
          polaris_test_sca_location: hybrid
